<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    CSP: allow styles and scripts only from the extension's own resources.
    'unsafe-inline' for style-src covers JS-set `element.style.*` attributes.
    {{CSP_SOURCE}} is replaced at runtime by WebviewContent.ts.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 style-src {{CSP_SOURCE}} 'unsafe-inline';
                 script-src {{CSP_SOURCE}};">
  <title>JSONL Table Explorer</title>
  <link rel="stylesheet" href="{{STYLES_URI}}">
</head>
<body>

<!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span class="file-name" id="fileName">Loading…</span>

  <button id="btnSave" class="primary">💾 <span data-i18n="save">Save</span></button>
  <button id="btnOpenEditor">📄 <span data-i18n="openEditor">Open in Editor</span></button>
  <button id="btnRefresh">⟳ <span data-i18n="refresh">Refresh</span></button>
  <button id="btnFilter">🔍 <span data-i18n="filter">Filter</span></button>
  <button id="btnStats">📊 <span data-i18n="stats">Stats</span></button>
  <button id="btnImport">↑ <span data-i18n="import">Import</span></button>
  <button id="btnExportCsv">↓ <span data-i18n="exportCsv">CSV</span></button>
  <button id="btnExportJsonl">↓ <span data-i18n="exportJsonl">JSONL</span></button>

  <span class="font-size-label" aria-hidden="true">A</span>
  <input id="fontSizeInput" type="number" min="10" max="24" step="1" value="12" aria-label="Font size">
  <select id="fontFamilySelect" aria-label="Font family">
    <option value="var(--vscode-font-family)">VSCode</option>
    <option value="Inter, var(--vscode-font-family)">Inter</option>
    <option value="'PingFang SC', 'Microsoft YaHei', sans-serif">中文系统</option>
    <option value="Consolas, 'Courier New', monospace">Monospace</option>
  </select>

  <button id="btnLang">🌐 EN</button>
</div>

<!-- ── Filter row ───────────────────────────────────────────────────────── -->
<div id="filterRow" role="search">
  <label for="filterCol" data-i18n="column">Column:</label>
  <select id="filterCol" aria-label="Filter column"></select>
  <label for="filterVal" data-i18n="contains">Contains:</label>
  <input type="text" id="filterVal" placeholder="filter text…" aria-label="Filter value">
  <button id="btnClearFilter">✕ <span data-i18n="clear">Clear</span></button>
</div>

<!-- ── Column stats bar ─────────────────────────────────────────────────── -->
<div id="colStatsBar" aria-live="polite"></div>

<!-- ── Table container ──────────────────────────────────────────────────── -->
<div id="tableContainer" role="region" aria-label="Data table">
  <table id="mainTable">
    <thead id="tableHead"><tr></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="tableFooter">
    <button id="btnAddRowBottom" class="primary">+ <span data-i18n="addRow">Add Row</span></button>
  </div>
</div>

<!-- ── Status bar ───────────────────────────────────────────────────────── -->
<div id="statusbar" aria-live="polite">
  <span id="statusLoaded"></span>
  <span id="statusTotal"></span>
  <span id="statusFiltered" hidden></span>
  <span id="statusSelected" hidden></span>
</div>

<!-- ── Loading indicator ────────────────────────────────────────────────── -->
<div id="loadingIndicator" hidden aria-live="polite">
  <span data-i18n="loadingMore">Loading more rows…</span>
</div>

<!-- ── Preview modal ────────────────────────────────────────────────────── -->
<div id="previewModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="previewTitle">
  <div class="modal-box">
    <h3 id="previewTitle">Row Preview</h3>
    <div class="json-preview json-tree" id="previewContent"></div>
    <div class="modal-actions">
      <button id="btnCopyJson"><span data-i18n="copyJson">Copy JSON</span></button>
      <button id="btnPreviewEdit"><span data-i18n="edit">Edit</span></button>
      <button id="btnPreviewClose"><span data-i18n="close">Close</span></button>
    </div>
  </div>
</div>

<!-- ── Edit row modal ────────────────────────────────────────────────────── -->
<div id="editModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
  <div class="modal-box edit-box">
    <h3 id="editModalTitle">Edit Row</h3>
    <div class="edit-fields" id="editFields"></div>
    <button id="btnAddField" class="add-field-btn">+ <span data-i18n="addField">Add Field</span></button>
    <div class="modal-actions">
      <button id="btnEditCancel"><span data-i18n="cancel">Cancel</span></button>
      <button id="btnEditSave" class="primary"><span data-i18n="save">Save</span></button>
    </div>
  </div>
</div>

<!-- ── Import modal ──────────────────────────────────────────────────────── -->
<div id="importModal" class="modal-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="importTitle">
  <div class="modal-box">
    <h3 id="importTitle" data-i18n="importTitle">Import Data</h3>
    <p data-i18n="importDesc" style="font-size:12px;color:var(--vscode-descriptionForeground)">
      Paste CSV or JSONL content. This replaces all file contents.
    </p>
    <select id="importFormat" aria-label="Import format">
      <option value="csv">CSV</option>
      <option value="jsonl">JSONL</option>
    </select>
    <textarea id="importContent" rows="8" placeholder="Paste content here…" aria-label="Import content"></textarea>
    <div class="modal-actions">
      <button id="btnImportCancel"><span data-i18n="cancel">Cancel</span></button>
      <button id="btnImportRun" class="primary"><span data-i18n="importRun">Import &amp; Replace</span></button>
    </div>
  </div>
</div>

<!-- ── Context menu ──────────────────────────────────────────────────────── -->
<div id="contextMenu" role="menu">
  <div class="ctx-item" role="menuitem" data-ctx-action="preview">👁 <span data-i18n="ctxPreview">Preview</span></div>
  <div class="ctx-item" role="menuitem" data-ctx-action="edit">✎ <span data-i18n="ctxEdit">Edit Row</span></div>
  <div class="ctx-sep" role="separator"></div>
  <div class="ctx-item" role="menuitem" data-ctx-action="copy">📋 <span data-i18n="ctxCopy">Copy JSON</span></div>
  <div class="ctx-item" role="menuitem" data-ctx-action="delete">🗑 <span data-i18n="ctxDelete">Delete Row</span></div>
</div>

<!-- ── Scripts (injected by WebviewContent.ts) ───────────────────────────── -->
{{SCRIPTS}}

</body>
</html>
